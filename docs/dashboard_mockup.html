<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スキルマップ／組織ダッシュボード</title>
<style>
  :root{
    --accent:#3357d6;
    --accent-soft:#eef1fd;
    --ok:#1a9e5c;
    --ok-soft:#e6f6ee;
    --ng:#d64545;
    --ng-soft:#fbecec;
    --bg:#f6f7fb;
    --card:#ffffff;
    --text:#1c2333;
    --muted:#6b7280;
    --border:#e6e8f0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;background:var(--bg);color:var(--text);
    font-family:"Hiragino Sans","Yu Gothic",-apple-system,BlinkMacSystemFont,sans-serif;
    padding:28px 32px;
  }
  .wrap{max-width:1080px;margin:0 auto;}
  h1{font-size:21px;margin:0;}
  .demo-flag{
    display:inline-block;font-size:11px;background:#fff3cd;color:#8a6d3b;
    padding:2px 8px;border-radius:6px;margin-left:8px;vertical-align:middle;
  }

  /* ヘッダー＋KPI */
  .head-row{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:14px;}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:9px 18px;font-size:13px;color:var(--muted);}
  .kpi b{font-size:20px;color:var(--text);margin:0 3px;}
  .kpi .up{color:var(--ok);font-weight:700;font-size:12px;margin-left:8px;}

  /* 🎉ティッカー */
  .ticker{
    display:flex;align-items:center;gap:12px;background:var(--card);
    border:1px solid var(--border);border-radius:12px;padding:12px 18px;margin-bottom:18px;
  }
  .ticker .icon{font-size:18px;flex-shrink:0;}
  .t-item{font-size:13.5px;transition:opacity .35s;min-width:0;}
  .t-item .t-date{color:var(--muted);font-size:12px;margin-right:8px;}
  .t-item b{color:var(--accent);}
  .new-badge{
    font-size:10px;background:var(--ok-soft);color:var(--ok);border-radius:6px;
    padding:1px 7px;font-weight:700;margin-left:8px;vertical-align:middle;
  }
  .t-count{margin-left:auto;font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0;}

  /* 大タブ */
  .big-tabs{display:flex;gap:8px;margin-bottom:16px;}
  .big-tab{
    flex:1;text-align:center;padding:12px;border:1px solid var(--border);border-radius:12px;
    background:var(--card);font-weight:700;font-size:14px;color:var(--muted);cursor:pointer;
  }
  .big-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}

  .panel{
    background:var(--card);border:1px solid var(--border);border-radius:14px;
    padding:22px 24px;
  }

  /* フィルタ行（溢れたら横スクロール） */
  .frow{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
  .flabel{font-size:12px;color:var(--muted);width:56px;flex-shrink:0;font-weight:600;}
  .scroll-x{
    display:flex;gap:6px;flex-wrap:nowrap;overflow-x:auto;min-width:0;flex:1;
    padding-bottom:4px;scrollbar-width:thin;
  }
  .scroll-x::-webkit-scrollbar{height:6px;}
  .scroll-x::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .tab{
    border:1px solid var(--border);background:var(--card);color:var(--muted);
    border-radius:999px;padding:7px 16px;font-size:12.5px;font-weight:600;cursor:pointer;
    white-space:nowrap;flex-shrink:0;
  }
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
  .chip{
    border:1px solid var(--border);background:var(--card);color:var(--muted);
    border-radius:999px;padding:7px 16px;font-size:12.5px;font-weight:600;cursor:pointer;
    white-space:nowrap;flex-shrink:0;
  }
  .chip.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent);}
  .chip.on::before{content:"✓ ";}
  .seg{display:inline-flex;border:1px solid var(--border);border-radius:10px;overflow:hidden;flex-shrink:0;}
  .seg button{
    border:none;background:var(--card);color:var(--muted);padding:8px 18px;
    font-size:12.5px;font-weight:600;cursor:pointer;border-right:1px solid var(--border);
  }
  .seg button:last-child{border-right:none;}
  .seg button.active{background:var(--accent);color:#fff;}

  /* ドーナツ＋凡例 */
  .donut-wrap{display:flex;align-items:flex-start;gap:30px;flex-wrap:wrap;margin-top:14px;}
  .donut{width:160px;height:160px;border-radius:50%;flex-shrink:0;position:relative;margin-top:8px;}
  .donut::after{content:"";position:absolute;inset:28px;background:var(--card);border-radius:50%;}
  .donut .center{
    position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;z-index:1;
  }
  .donut .center b{font-size:24px;}
  .donut .center span{font-size:10.5px;color:var(--muted);}
  .lg{flex:1;min-width:320px;}
  .lg-item{border-bottom:1px solid var(--border);}
  .lg-item:last-child{border-bottom:none;}
  .lg-head{
    display:grid;grid-template-columns:14px 1fr 52px 16px;gap:10px;align-items:center;
    padding:9px 4px;font-size:13px;cursor:pointer;user-select:none;border-radius:8px;
  }
  .lg-head:hover{background:var(--accent-soft);}
  .swatch{width:11px;height:11px;border-radius:3px;}
  .lg-cnt{color:var(--muted);text-align:right;white-space:nowrap;font-size:12.5px;}
  .caret{color:var(--muted);font-size:11px;text-align:center;transition:transform .15s;}
  .lg-item.open .caret{transform:rotate(90deg);}
  .lg-members{display:none;padding:2px 4px 12px 25px;}
  .lg-item.open .lg-members{display:block;}
  .member-chip{
    display:inline-block;background:var(--accent-soft);color:var(--accent);
    border-radius:999px;padding:3px 12px;margin:3px 4px 0 0;font-weight:600;font-size:12px;
  }
  .other-chip{
    display:inline-block;background:#f3f4f8;color:var(--muted);
    border-radius:999px;padding:3px 12px;margin:3px 4px 0 0;font-weight:600;font-size:12px;
  }
  .hint{position:relative;cursor:help;margin-left:4px;}
  .hint .tip{
    display:none;position:absolute;bottom:135%;left:50%;transform:translateX(-50%);
    background:#1c2333;color:#fff;font-size:11px;font-weight:500;
    padding:6px 12px;border-radius:8px;white-space:nowrap;z-index:5;
  }
  .hint:hover .tip{display:block;}
  .hint-note{font-size:11.5px;color:var(--muted);margin:16px 0 0;}
  .empty{padding:30px 0;text-align:center;color:var(--muted);font-size:13px;}

  /* 年度推移（縦軸固定・目盛り線つき） */
  .trend-chart{position:relative;height:150px;margin:22px 8px 0 36px;}
  .gline{position:absolute;left:0;right:0;border-top:1px dashed var(--border);}
  .gline span{
    position:absolute;left:-32px;top:-8px;width:26px;text-align:right;
    font-size:10.5px;color:var(--muted);
  }
  .trend-cols{position:absolute;inset:0;display:flex;align-items:flex-end;gap:24px;}
  .trend-cols .col{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    height:100%;cursor:pointer;border-radius:8px;
  }
  .trend-cols .col:hover{background:var(--accent-soft);}
  .trend-cols .col.sel{background:var(--accent-soft);}
  .trend-cols .cnt{font-size:12.5px;font-weight:700;margin-bottom:5px;}
  .trend-cols .colbar{width:42px;display:flex;flex-direction:column-reverse;border-radius:6px 6px 0 0;overflow:hidden;}
  .trend-cols .colbar i{width:100%;display:block;}
  .trend-cols .col.now .colbar{outline:2px solid var(--accent);outline-offset:2px;}
  .trend-years{display:flex;gap:24px;margin:10px 8px 0 36px;}
  .trend-years div{flex:1;text-align:center;font-size:11.5px;color:var(--muted);white-space:nowrap;}
  .trend-years div.now{color:var(--accent);font-weight:700;}
  .cat-legend{display:flex;gap:16px;font-size:11.5px;color:var(--muted);margin-top:16px;align-items:center;flex-wrap:wrap;}
  .cat-legend span{display:inline-flex;align-items:center;gap:5px;}
  .trend-detail{
    margin-top:16px;border:1px solid var(--border);border-radius:12px;
    background:var(--bg);padding:14px 16px;font-size:12.5px;
  }
  .trend-detail h3{font-size:12.5px;margin:0 0 8px;}
  .trend-detail .td-row{display:inline-flex;align-items:center;gap:6px;margin:3px 8px 3px 0;
    background:var(--card);border:1px solid var(--border);border-radius:999px;padding:3px 12px;font-weight:600;}
  .trend-detail .td-date{color:var(--muted);font-weight:500;font-size:11.5px;}
  .trend-detail .td-cert{color:var(--accent);}

  /* ヒートマップ */
  .heat-wrap{overflow-x:auto;margin-top:14px;}
  table.heat{border-collapse:separate;border-spacing:4px;width:100%;font-size:12.5px;}
  table.heat th{font-weight:600;color:var(--muted);padding:8px 6px;text-align:center;font-size:11.5px;white-space:nowrap;}
  table.heat th.rowh{text-align:left;font-size:12.5px;color:var(--text);white-space:nowrap;}
  table.heat td{text-align:center;padding:13px 10px;border-radius:8px;font-weight:700;min-width:64px;}
  .h0{background:#f3f4f8;color:#b0b4c0;}
  .h1{background:#dbe3fb;color:#3d55b8;}
  .h2{background:#aebffa;color:#26398a;}
  .h3{background:#5c7cf0;color:#fff;}
  .h4{background:#3357d6;color:#fff;}
  .heat-legend{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:12px;}
  .heat-legend i{width:22px;height:12px;border-radius:3px;display:inline-block;}
  .heat-note{font-size:11.5px;color:var(--muted);margin:12px 0 0;}
</style>
</head>
<body>
<div class="wrap">

  <div class="head-row">
    <h1>スキルマップ／組織ダッシュボード <span class="demo-flag">サンプルデータ</span></h1>
    <div class="kpi">資格保有 <b id="kpiTotal">-</b>件 <span class="up" id="kpiDiff"></span></div>
  </div>

  <div class="ticker" id="ticker">
    <span class="icon">🎉</span>
    <div class="t-item" id="tickerItem"></div>
    <span class="t-count" id="tickerCount"></span>
  </div>

  <div class="big-tabs" id="bigTabs">
    <button class="big-tab active" data-sec="cert">資格</button>
    <button class="big-tab" data-sec="skill">スキル</button>
    <button class="big-tab" data-sec="heat">ヒートマップ</button>
  </div>

  <!-- 資格 -->
  <section class="panel" id="sec-cert">
    <div class="frow"><span class="flabel">部署</span><div class="scroll-x" id="certDept"></div></div>
    <div class="frow"><span class="flabel">カテゴリ</span><div class="scroll-x" id="certCats"></div></div>
    <div class="frow"><span class="flabel">表示</span>
      <div class="seg" id="certView">
        <button class="active" data-view="ratio">構成比</button>
        <button data-view="trend">年度推移</button>
      </div>
    </div>
    <div id="certBody"></div>
    <p class="hint-note" id="certNote"></p>
  </section>

  <!-- スキル -->
  <section class="panel" id="sec-skill" style="display:none">
    <div class="frow"><span class="flabel">部署</span><div class="scroll-x" id="skillDept"></div></div>
    <div class="frow"><span class="flabel">カテゴリ</span><div class="scroll-x" id="skillCats"></div></div>
    <div id="skillBody"></div>
    <p class="hint-note">凡例クリックで保有者を表示</p>
  </section>

  <!-- ヒートマップ -->
  <section class="panel" id="sec-heat" style="display:none">
    <div class="frow"><span class="flabel">対象</span>
      <div class="seg" id="heatType">
        <button class="active" data-v="cert">資格</button>
        <button data-v="skill">スキル</button>
      </div>
      <span class="flabel" style="width:auto">集計</span>
      <div class="seg" id="heatMode">
        <button class="active" data-v="count">人数</button>
        <button data-v="rate">保有率</button>
      </div>
    </div>
    <div class="frow"><span class="flabel">カテゴリ</span><div class="scroll-x" id="heatCats"></div></div>
    <div id="heatBody"></div>
    <p class="heat-note">人数は延べ人数（1人が複数保有する場合は重複してカウント）。そのため保有率（＝延べ人数÷部署在籍人数）は100%を超える場合があります。色が濃い＝多い。</p>
  </section>

</div>

<script>
/* ================= サンプルデータ ================= */
const TODAY = new Date('2026-07-15');

/* 部署＝事業部・部の単位（グループは扱わない。集計時は配下グループ所属者を部にロールアップ済みの想定）
   サンプルA〜Cは横スクロール・空状態の確認用 */
const DEPTS = {
  si :{name:'SI',       head:11},
  cld:{name:'クラウド', head:10},
  fin:{name:'金融',     head:12},
  ret:{name:'流通',     head:9},
  dx :{name:'DX',       head:6},
  erp:{name:'ERP',      head:4},
  smpa:{name:'サンプルA', head:5},
  smpb:{name:'サンプルB', head:5},
  smpc:{name:'サンプルC', head:5},
};
const DEPT_ORDER = ['si','cld','fin','ret','dx','erp','smpa','smpb','smpc'];

const PEOPLE = [
  ['開発 太郎','si'],['営業 花子','si'],['山田 一郎','si'],['小林 八郎','si'],
  ['加藤 九子','si'],['中村 十二','si'],['松本 一花','si'],['井上 二葉','si'],
  ['伊藤 六実','cld'],['田中 四郎','cld'],['高橋 五郎','cld'],['森 七生','cld'],
  ['池田 八雲','cld'],['山口 六花','cld'],
  ['佐藤 次郎','fin'],['鈴木 三郎','fin'],['吉田 十太','fin'],['斎藤 一馬','fin'],
  ['岡田 二郎','fin'],['後藤 三保','fin'],
  ['渡辺 七海','ret'],['山本 十一','ret'],['藤田 一颯','ret'],['三浦 三丞','ret'],
  ['中野 一真','dx'],['原田 二美','dx'],['大野 三平','dx'],
  ['菊池 四央','erp'],['千葉 五実','erp'],
];

const CERT_CATS  = {national:'国家資格', vendor:'ベンダー資格', other:'その他'};
const SKILL_CATS = {lang:'プログラミング言語', cloud:'クラウド・インフラ', db:'データベース', biz:'業務知識'};

/* h: [人物index, 取得日] */
const CERTS = [
  {name:'基本情報技術者', cat:'national', h:[[0,'2023-11-20'],[1,'2022-06-12'],[8,'2024-04-21'],[14,'2021-10-17'],[20,'2024-10-20'],[24,'2024-09-15']]},
  {name:'応用情報技術者', cat:'national', h:[[2,'2024-06-30'],[8,'2026-05-20'],[15,'2023-06-25']]},
  {name:'ネットワークスペシャリスト', cat:'national', h:[[2,'2025-12-21'],[14,'2024-12-15']]},
  {name:'ITパスポート', cat:'national', h:[[21,'2022-04-17'],[25,'2025-10-05']]},
  {name:'情報セキュリティマネジメント', cat:'national', h:[[10,'2025-07-06']]},
  {name:'AWS 認定ソリューションアーキテクト', cat:'vendor', h:[[1,'2026-07-10'],[2,'2025-05-18'],[9,'2024-09-08'],[16,'2025-11-02']]},
  {name:'AWS クラウドプラクティショナー', cat:'vendor', h:[[0,'2025-04-13'],[4,'2024-02-04']]},
  {name:'Microsoft Azure Fundamentals', cat:'vendor', h:[[3,'2026-03-08'],[10,'2025-09-14'],[5,'2024-11-10'],[9,'2023-03-05']]},
  {name:'Oracle Master Silver', cat:'vendor', h:[[14,'2026-07-14'],[15,'2022-12-11']]},
  {name:'Google Cloud 認定 ACE', cat:'vendor', h:[[8,'2025-02-16'],[9,'2023-10-22']]},
  {name:'簿記2級', cat:'other', h:[[20,'2026-06-28'],[16,'2021-06-13'],[27,'2024-05-19']]},
  {name:'FP技能士2級', cat:'other', h:[[21,'2023-08-27'],[4,'2024-07-21'],[28,'2025-08-24']]},
  {name:'ビジネス実務法務検定2級', cat:'other', h:[[15,'2025-06-08']]},
];

/* h: [人物index] */
const SKILLS = [
  {name:'Java', cat:'lang', h:[0,1,2,3,8,9,14,15,16,20,21,22,24]},
  {name:'Python', cat:'lang', h:[0,2,4,8,10,14,17,20,23,25]},
  {name:'TypeScript', cat:'lang', h:[0,1,5,6,9,11,18,21]},
  {name:'JavaScript', cat:'lang', h:[1,6,7,9,12,20]},
  {name:'C#', cat:'lang', h:[3,10,15,19,23]},
  {name:'PHP', cat:'lang', h:[8,13,16,22]},
  {name:'Ruby', cat:'lang', h:[4,11,21]},
  {name:'Kotlin', cat:'lang', h:[3,4]},
  {name:'Swift', cat:'lang', h:[16,21]},
  {name:'Go', cat:'lang', h:[2]},
  {name:'COBOL', cat:'lang', h:[15]},
  {name:'Rust', cat:'lang', h:[5]},
  {name:'AWS設計・構築', cat:'cloud', h:[1,2,9,10,16]},
  {name:'Azure設計・構築', cat:'cloud', h:[3,5,10,12]},
  {name:'Linuxサーバ運用', cat:'cloud', h:[10,12,13,18,26]},
  {name:'ネットワーク構築', cat:'cloud', h:[2,14,17,26]},
  {name:'Docker / Kubernetes', cat:'cloud', h:[2,11]},
  {name:'SQL', cat:'db', h:[0,14,15,16,17,19,20,24]},
  {name:'PostgreSQL', cat:'db', h:[0,2,8,19]},
  {name:'SQL Server', cat:'db', h:[15,18]},
  {name:'Oracle DB運用', cat:'db', h:[14]},
  {name:'プロジェクト管理', cat:'biz', h:[0,2,14,19,21,27]},
  {name:'要件定義', cat:'biz', h:[0,1,8,14,25,28]},
  {name:'金融業務知識', cat:'biz', h:[14,15,16,17]},
  {name:'流通・小売業務知識', cat:'biz', h:[20,21,22,23]},
];

/* ログインユーザー（サンプル） */
const ME = {pid:0, certs:['基本情報技術者','AWS クラウドプラクティショナー']};

const PALETTE = ['#3357d6','#5c7cf0','#8fa6f5','#c2cffa','#dbe3fb'];
const REST_COLOR = '#e6e8f0';   /* その他（上位5以外） */
const CAT_COLORS = {national:'#3357d6', vendor:'#5c7cf0', other:'#c2cffa'};

/* ================= 状態 ================= */
const STATE = {
  cert:  {dept:'all', cats:new Set(Object.keys(CERT_CATS)),  view:'ratio', trendYear:null},
  skill: {dept:'all', cats:new Set(Object.keys(SKILL_CATS))},
  heat:  {type:'cert', mode:'count',
          cats:{cert:new Set(Object.keys(CERT_CATS)), skill:new Set(Object.keys(SKILL_CATS))}},
};

/* ================= 共通ユーティリティ ================= */
const fy = d => { const t=new Date(d); return (t.getMonth()+1)>=3 ? t.getFullYear() : t.getFullYear()-1; };
const CURRENT_FY = fy(TODAY);
const isNew = d => (TODAY - new Date(d)) <= 92*24*60*60*1000; /* 直近3か月 */
const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;');
const defsOf = t => t==='cert' ? CERTS : SKILLS;
const catsOf = t => t==='cert' ? CERT_CATS : SKILL_CATS;
const holdersOf = (t,x) => t==='cert' ? x.h.map(e=>e[0]) : x.h;
const inDept = (pid, dept) => dept==='all' || PEOPLE[pid][1]===dept;

function collect(type){
  const st = STATE[type];
  return defsOf(type)
    .filter(x => st.cats.has(x.cat))
    .map(x => ({name:x.name, cat:x.cat,
      members: holdersOf(type,x).filter(pid=>inDept(pid, st.dept)).map(pid=>({pid}))}))
    .filter(x => x.members.length > 0)
    .sort((a,b) => b.members.length - a.members.length);
}

/* 💡おすすめ：ログインユーザーが保有していない × 選択スコープで保有者が多い（上位3・2名以上） */
function recommendMap(){
  const st = STATE.cert;
  const scopeName = st.dept==='all' ? '全社' : DEPTS[st.dept].name;
  const map = {};
  CERTS
    .filter(c => !ME.certs.includes(c.name))
    .map(c => ({name:c.name, n:c.h.filter(e=>inDept(e[0], st.dept)).length}))
    .filter(c => c.n >= 2)
    .sort((a,b) => b.n - a.n)
    .slice(0,3)
    .forEach(c => { map[c.name] = `${scopeName}で${c.n}名が保有している人気の資格です`; });
  return map;
}

function conic(parts){
  let acc = 0;
  const segs = parts.map((p,i)=>{
    const s = acc;
    acc = (i===parts.length-1) ? 100 : acc + p.pct;
    return `${p.color} ${s}% ${acc}%`;
  });
  return `conic-gradient(${segs.join(',')})`;
}

function memberChips(members, showDept){
  return members.map(m=>{
    const [nm,dp] = PEOPLE[m.pid];
    return `<span class="member-chip">${esc(nm)}${showDept?`（${DEPTS[dp].name}）`:''}</span>`;
  }).join('');
}

/* ================= 構成比（資格・スキル共通） ================= */
function renderComposition(type, mount){
  const st = STATE[type];
  const items = collect(type);

  if(items.length===0){
    mount.innerHTML = '<div class="empty">該当する登録がありません</div>'; return;
  }

  const total = items.reduce((s,x)=>s+x.members.length, 0);
  const top = items.slice(0,5);
  const rest = items.slice(5);
  const restCount = rest.reduce((s,x)=>s+x.members.length, 0);

  const parts = top.map((x,i)=>({color:PALETTE[i], pct:x.members.length/total*100}));
  if(rest.length) parts.push({color:REST_COLOR, pct:restCount/total*100});

  const recs = type==='cert' ? recommendMap() : {};
  const showDept = st.dept==='all';

  const legendRows = top.map((x,i)=>{
    const hint = recs[x.name]
      ? `<span class="hint">💡<span class="tip">${esc(recs[x.name])}</span></span>` : '';
    return `<div class="lg-item">
      <div class="lg-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="swatch" style="background:${PALETTE[i]}"></span>
        <span>${esc(x.name)}${hint}</span>
        <span class="lg-cnt">${x.members.length}名</span><span class="caret">▶</span>
      </div>
      <div class="lg-members">${memberChips(x.members, showDept)}</div>
    </div>`;
  }).join('');

  const restRow = rest.length ? `<div class="lg-item">
      <div class="lg-head" onclick="this.parentElement.classList.toggle('open')">
        <span class="swatch" style="background:${REST_COLOR}"></span>
        <span>その他（${rest.length}種）</span>
        <span class="lg-cnt">${restCount}件</span><span class="caret">▶</span>
      </div>
      <div class="lg-members">${rest.map(x=>`<span class="other-chip">${esc(x.name)}（${x.members.length}名）</span>`).join('')}</div>
    </div>` : '';

  mount.innerHTML = `<div class="donut-wrap">
    <div class="donut" style="background:${conic(parts)}">
      <div class="center"><b>${total}</b><span>件</span></div>
    </div>
    <div class="lg">${legendRows}${restRow}</div>
  </div>`;
}

/* ================= 年度推移（資格のみ・縦軸固定） ================= */
const TREND_BUCKETS = ['〜2021','2022','2023','2024','2025',String(CURRENT_FY)];
/* 縦軸上限＝全社・全カテゴリでの年度別最大件数を5の倍数に切り上げて固定 */
const TREND_AXIS_MAX = (()=>{
  const t = {};
  CERTS.forEach(c=>c.h.forEach(e=>{
    const f = fy(e[1]);
    const b = f<=2021 ? '〜2021' : String(f);
    if(TREND_BUCKETS.includes(b)) t[b]=(t[b]||0)+1;
  }));
  return Math.max(5, Math.ceil(Math.max(...Object.values(t))/5)*5);
})();

/* 指定年度バケツの取得一覧（部署・カテゴリ絞込を反映、取得日の新しい順） */
function acquisitionsIn(bucket){
  const st = STATE.cert;
  const out = [];
  CERTS.filter(c=>st.cats.has(c.cat)).forEach(c=>c.h.forEach(e=>{
    if(!inDept(e[0], st.dept)) return;
    const f = fy(e[1]);
    if((f<=2021 ? '〜2021' : String(f)) !== bucket) return;
    out.push({pid:e[0], cert:c.name, date:e[1]});
  }));
  return out.sort((a,b)=> new Date(b.date) - new Date(a.date));
}

function renderTrend(mount){
  const st = STATE.cert;
  const selCats = Object.keys(CERT_CATS).filter(c=>st.cats.has(c));
  const data = {};
  TREND_BUCKETS.forEach(b => data[b] = {national:0, vendor:0, other:0, total:0});

  CERTS.filter(c=>st.cats.has(c.cat)).forEach(c => c.h.forEach(e => {
    if(!inDept(e[0], st.dept)) return;
    const f = fy(e[1]);
    const b = f<=2021 ? '〜2021' : String(f);
    if(!data[b]) return;
    data[b][c.cat]++; data[b].total++;
  }));

  const single = selCats.length===1;
  const H = 150;

  const glines = [];
  for(let v=0; v<=TREND_AXIS_MAX; v+=5){
    glines.push(`<div class="gline" style="bottom:${v/TREND_AXIS_MAX*100}%"><span>${v}</span></div>`);
  }

  const cols = TREND_BUCKETS.map(b=>{
    const d = data[b];
    const h = Math.round(d.total/TREND_AXIS_MAX*H);
    const segs = single
      ? `<i style="height:100%;background:${CAT_COLORS[selCats[0]]}"></i>`
      : (d.total ? selCats.map(c=>`<i style="height:${d[c]/d.total*100}%;background:${CAT_COLORS[c]}"></i>`).join('') : '');
    const now = b===String(CURRENT_FY);
    const sel = b===st.trendYear;
    return `<div class="col${now?' now':''}${sel?' sel':''}" data-b="${b}" title="クリックで取得者を表示">
      <div class="cnt">${d.total}</div>
      <div class="colbar" style="height:${Math.max(h, d.total?4:0)}px">${segs}</div>
    </div>`;
  }).join('');

  const years = TREND_BUCKETS.map(b=>{
    const now = b===String(CURRENT_FY);
    return `<div class="${now?'now':''}">${b}年度${now?'（今年度）':''}</div>`;
  }).join('');

  const legend = selCats.map(c =>
    `<span><span class="swatch" style="background:${CAT_COLORS[c]}"></span>${CERT_CATS[c]}</span>`).join('')
    + '<span style="margin-left:auto">年度＝3月〜翌2月。年度別の新規取得件数（縦軸は固定）</span>';

  /* 選択年度の取得者一覧 */
  let detail = '';
  if(st.trendYear){
    const list = acquisitionsIn(st.trendYear);
    const showDept = st.dept==='all';
    detail = `<div class="trend-detail">
      <h3>${esc(st.trendYear)}年度の取得（${list.length}件）</h3>
      ${list.length ? list.map(a=>{
        const [nm,dp] = PEOPLE[a.pid];
        const d = new Date(a.date);
        return `<span class="td-row"><span class="td-date">${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')}</span>${esc(nm)}${showDept?`（${DEPTS[dp].name}）`:''}<span class="td-cert">${esc(a.cert)}</span></span>`;
      }).join('') : '<span style="color:var(--muted)">該当する取得はありません</span>'}
    </div>`;
  }

  mount.innerHTML = `<div class="trend-chart">${glines.join('')}<div class="trend-cols" id="trendCols">${cols}</div></div>
    <div class="trend-years">${years}</div>
    <div class="cat-legend">${legend}</div>${detail}`;

  document.getElementById('trendCols').onclick = e=>{
    const col = e.target.closest('.col'); if(!col) return;
    st.trendYear = (st.trendYear===col.dataset.b) ? null : col.dataset.b;
    renderTrend(mount);
  };
}

/* ================= ヒートマップ（延べ人数） ================= */
function renderHeat(){
  const st = STATE.heat;
  const allCats = catsOf(st.type);
  const selCats = Object.keys(allCats).filter(c=>st.cats[st.type].has(c));

  /* 延べ件数：カテゴリ内の保有登録件数の合計（同一人物の複数保有も重複カウント） */
  const gross = (dk, catKey) => defsOf(st.type)
    .filter(x=>x.cat===catKey)
    .reduce((s,x)=>s+holdersOf(st.type,x).filter(pid=>PEOPLE[pid][1]===dk).length, 0);

  const rows = DEPT_ORDER.map(dk=>{
    const cells = selCats.map(ck=>{
      const n = gross(dk, ck);
      if(st.mode==='count'){
        const cls = n===0?'h0' : n<=3?'h1' : n<=7?'h2' : n<=12?'h3' : 'h4';
        return `<td class="${cls}">${n}</td>`;
      }
      const r = n / DEPTS[dk].head * 100;
      const cls = r===0?'h0' : r<30?'h1' : r<60?'h2' : r<100?'h3' : 'h4';
      return `<td class="${cls}">${Math.round(r)}%</td>`;
    }).join('');
    return `<tr><th class="rowh">${DEPTS[dk].name}<span style="color:var(--muted);font-weight:500">（${DEPTS[dk].head}名）</span></th>${cells}</tr>`;
  }).join('');

  document.getElementById('heatBody').innerHTML = `<div class="heat-wrap"><table class="heat">
    <tr><th class="rowh"></th>${selCats.map(c=>`<th>${allCats[c]}</th>`).join('')}</tr>${rows}
  </table></div>
  <div class="heat-legend">少ない <i class="h0"></i><i class="h1"></i><i class="h2"></i><i class="h3"></i><i class="h4"></i> 多い</div>`;
}

/* ================= フィルタUIの生成 ================= */
function buildDeptTabs(mountId, type){
  const mount = document.getElementById(mountId);
  const opts = [['all','全社'], ...DEPT_ORDER.map(k=>[k, DEPTS[k].name])];
  mount.innerHTML = opts.map(([k,label]) =>
    `<button class="tab${STATE[type].dept===k?' active':''}" data-k="${k}">${label}</button>`).join('');
  mount.onclick = e => {
    const btn = e.target.closest('.tab'); if(!btn) return;
    STATE[type].dept = btn.dataset.k;
    mount.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t===btn));
    render(type);
  };
}

function buildCatChips(mountId, cats, getSet, onChange){
  const mount = document.getElementById(mountId);
  const set = getSet();
  mount.innerHTML = Object.entries(cats).map(([k,label]) =>
    `<button class="chip${set.has(k)?' on':''}" data-k="${k}">${label}</button>`).join('');
  mount.onclick = e => {
    const btn = e.target.closest('.chip'); if(!btn) return;
    const s = getSet(), k = btn.dataset.k;
    if(s.has(k)){ if(s.size===1) return; /* 最後の1つはOFF不可 */ s.delete(k); }
    else s.add(k);
    btn.classList.toggle('on', s.has(k));
    onChange();
  };
}

function render(type){
  if(type==='cert'){
    const mount = document.getElementById('certBody');
    const note = document.getElementById('certNote');
    if(STATE.cert.view==='ratio'){
      renderComposition('cert', mount);
      note.textContent = '💡＝あなたへのおすすめ（サンプル：開発 太郎としてログイン中）／凡例クリックで保有者を表示';
    }else{
      renderTrend(mount);
      note.textContent = '棒グラフをクリックすると、その年度の取得者を表示します';
    }
  }else if(type==='skill'){
    renderComposition('skill', document.getElementById('skillBody'));
  }
}

/* ================= ヘッダーKPI・ティッカー ================= */
function initHeader(){
  const total = CERTS.reduce((s,c)=>s+c.h.length, 0);
  const items = [];
  CERTS.forEach(c => c.h.forEach(e => {
    if(fy(e[1])===CURRENT_FY){
      const [nm,dp] = PEOPLE[e[0]];
      items.push({nm, dept:DEPTS[dp].name, cert:c.name, date:e[1]});
    }
  }));
  items.sort((a,b)=> new Date(b.date) - new Date(a.date));

  document.getElementById('kpiTotal').textContent = total;
  document.getElementById('kpiDiff').textContent = `▲ +${items.length}件（前年度末比）`;

  const el = document.getElementById('tickerItem');
  const cnt = document.getElementById('tickerCount');
  let idx = 0;
  const show = () => {
    const it = items[idx];
    const d = new Date(it.date);
    el.innerHTML = `<span class="t-date">${d.getMonth()+1}/${String(d.getDate()).padStart(2,'0')}</span>`
      + `<b>${esc(it.nm)}</b>さん（${it.dept}）が <b>${esc(it.cert)}</b> を取得しました！`
      + (isNew(it.date) ? '<span class="new-badge">NEW</span>' : '');
    cnt.textContent = `${idx+1} / ${items.length}件（今年度）`;
  };
  show();
  if(items.length > 1){
    let timer = setInterval(next, 4500);
    function next(){
      el.style.opacity = 0;
      setTimeout(()=>{ idx = (idx+1)%items.length; show(); el.style.opacity = 1; }, 350);
    }
    const box = document.getElementById('ticker');
    box.addEventListener('mouseenter', ()=>clearInterval(timer));
    box.addEventListener('mouseleave', ()=>{ timer = setInterval(next, 4500); });
  }
}

/* ================= 初期化 ================= */
document.getElementById('bigTabs').addEventListener('click', e=>{
  const btn = e.target.closest('.big-tab'); if(!btn) return;
  document.querySelectorAll('.big-tab').forEach(t=>t.classList.toggle('active', t===btn));
  ['cert','skill','heat'].forEach(s=>{
    document.getElementById('sec-'+s).style.display = (s===btn.dataset.sec) ? '' : 'none';
  });
});

document.getElementById('certView').addEventListener('click', e=>{
  const btn = e.target.closest('button'); if(!btn) return;
  STATE.cert.view = btn.dataset.view;
  document.querySelectorAll('#certView button').forEach(b=>b.classList.toggle('active', b===btn));
  render('cert');
});

document.getElementById('heatType').addEventListener('click', e=>{
  const btn = e.target.closest('button'); if(!btn) return;
  STATE.heat.type = btn.dataset.v;
  document.querySelectorAll('#heatType button').forEach(b=>b.classList.toggle('active', b===btn));
  buildHeatChips();
  renderHeat();
});
document.getElementById('heatMode').addEventListener('click', e=>{
  const btn = e.target.closest('button'); if(!btn) return;
  STATE.heat.mode = btn.dataset.v;
  document.querySelectorAll('#heatMode button').forEach(b=>b.classList.toggle('active', b===btn));
  renderHeat();
});

function buildHeatChips(){
  buildCatChips('heatCats', catsOf(STATE.heat.type),
    ()=>STATE.heat.cats[STATE.heat.type], renderHeat);
}

buildDeptTabs('certDept','cert');
buildDeptTabs('skillDept','skill');
buildCatChips('certCats', CERT_CATS, ()=>STATE.cert.cats, ()=>render('cert'));
buildCatChips('skillCats', SKILL_CATS, ()=>STATE.skill.cats, ()=>render('skill'));
buildHeatChips();
initHeader();
render('cert');
render('skill');
renderHeat();
</script>
